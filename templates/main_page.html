<!DOCTYPE html>
<html>
<head>
    <title>Send Text to PC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            background: #28a745;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #fff;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.1);
        }
        .resend-button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        .resend-button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enter Text to Send</h2>
        <form action="/send" method="post">
            <textarea name="text" placeholder="Type or scan here..."></textarea><br>
            <button type="submit">Send</button>
        </form>
        
        <h2>Previous Texts</h2>
        <ul>
            {% for msg in history %}
                <li>
                    <span>{{ msg }}</span>
                    <form action="/send" method="post" style="display:inline;">
                        <input type="hidden" name="text" value="{{ msg }}">
                        <button type="submit" class="resend-button">Resend</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
        <form action="/clear" method="post" style="display:inline;">
            <button type="submit" class="resend-button">Clear History</button>
        </form>
    </div>
</body>
</html>
